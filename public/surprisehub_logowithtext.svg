<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="giftGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
  </defs>

  <!-- Icon-Gruppe -->
  <g transform="translate(10,10)">
    <!-- Box -->
    <rect x="8" y="20" width="40" height="34" rx="6" fill="url(#giftGradient)"/>
    <!-- Vertikales Band -->
    <rect x="26" y="20" width="4" height="34" fill="#F9FAFB" opacity="0.9"/>
    <!-- Horizontaler Deckel -->
    <rect x="8" y="20" width="40" height="5" fill="#F9FAFB" opacity="0.9"/>

    <!-- Schleife links -->
    <path d="M28 20 C18 10, 16 6, 22 6 C26 6, 28 10, 28 14 Z"
          fill="#22D3EE"/>
    <!-- Schleife rechts -->
    <path d="M28 20 C38 10, 40 6, 34 6 C30 6, 28 10, 28 14 Z"
          fill="#FACC15"/>

    <!-- Funken / Hub-Punkte -->
    <circle cx="12" cy="10" r="2.2" fill="url(#sparkGradient)"/>
    <circle cx="46" cy="8" r="2.2" fill="url(#sparkGradient)"/>
    <circle cx="56" cy="24" r="2" fill="#22D3EE"/>
    <circle cx="4"  cy="26" r="2" fill="#EC4899"/>

    <!-- Verbindungslinien -->
    <line x1="28" y1="16" x2="12" y2="10" stroke="#A5B4FC" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="28" y1="16" x2="46" y2="8" stroke="#A5B4FC" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="28" y1="28" x2="56" y2="24" stroke="#A5B4FC" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="4"  y2="26" stroke="#A5B4FC" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Wortmarke -->
  <g transform="translate(80,20)" fill="#0F172A">
    <text x="0" y="22"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="24"
          font-weight="700"
          letter-spacing="0.02em">
      Surprise
      <tspan fill="#7C3AED">Hub</tspan>
    </text>
    <text x="0" y="42"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11"
          fill="#6B7280">
      AI-powered gift ideas
    </text>
  </g>
</svg>
